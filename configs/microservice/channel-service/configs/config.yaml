server:
  grpc_endpoint: 0.0.0.0:9990
  max_recv_msg_size: 4294967296  # 4G

callback:
  endpoint: "0.0.0.0:8090"  # HTTP 回调服务器地址，用于接收平台 Webhook 推送

log:
  std: true
  level: debug
  logs:
    - enable: true
      filename: log/channel-info.log
      level: info
      max_size: 10
      max_backups: 10
      max_age: 30
    - enable: true
      filename: log/channel-err.log
      level: error
      max_size: 10
      max_backups: 10
      max_age: 30

