syntax = "proto3";

package channel_service;

import "google/protobuf/empty.proto";

option go_package = "github.com/UnicomAI/wanwu/api/proto/channel-service";

// ============================================================
// Channel Service — 通道服务
// 对接钉钉/微信/飞书，将已发布智能体接入第三方平台
// ============================================================

service ChannelService {
  // --- 万悟平台代理 ---
  // 获取万悟智能体列表（前端下拉选择用）
  rpc ListWanwuAgents(ListWanwuAgentsReq) returns (ListWanwuAgentsResp) {}
  // 获取万悟 API Key 列表（前端下拉选择用）
  rpc ListWanwuApiKeys(ListWanwuApiKeysReq) returns (ListWanwuApiKeysResp) {}

  // --- 扫码登录 ---
  // 发起扫码登录
  rpc CreateQRLogin(CreateQRLoginReq) returns (CreateQRLoginResp) {}
  // 查询扫码状态
  rpc GetQRLoginStatus(GetQRLoginStatusReq) returns (QRLoginStatus) {}
  // 取消扫码登录
  rpc CancelQRLogin(CancelQRLoginReq) returns (google.protobuf.Empty) {}
  // 完成扫码登录（扫码成功后创建通道）
  rpc CompleteQRLogin(CompleteQRLoginReq) returns (Channel) {}

  // --- 通道管理 ---
  // 创建通道
  rpc CreateChannel(CreateChannelReq) returns (Channel) {}
  // 获取通道列表
  rpc ListChannels(ListChannelsReq) returns (ListChannelsResp) {}
  // 获取通道详情
  rpc GetChannel(GetChannelReq) returns (Channel) {}
  // 更新通道
  rpc UpdateChannel(UpdateChannelReq) returns (Channel) {}
  // 启用/停用通道
  rpc UpdateChannelStatus(UpdateChannelStatusReq) returns (Channel) {}
  // 删除通道
  rpc DeleteChannel(DeleteChannelReq) returns (google.protobuf.Empty) {}
  // 断开通道连接
  rpc DisconnectChannel(DisconnectChannelReq) returns (google.protobuf.Empty) {}
}

// ============================================================
// 万悟平台代理
// ============================================================

message ListWanwuAgentsReq {
  string api_key = 1;   // 用户选择的 API Key，用于鉴权
  string name = 2;       // 按名称模糊筛选
  string user_id = 3;   // 内部：用户 ID（从 JWT 获取）
  string org_id = 4;    // 内部：组织 ID
}

message WanwuAgentBrief {
  string app_id = 1;     // 智能体 UUID
  string name = 2;
  string desc = 3;
  string avatar_url = 4;
  string publish_type = 5;  // public/organization/private
  string version = 6;
}

message ListWanwuAgentsResp {
  repeated WanwuAgentBrief list = 1;
}

message ListWanwuApiKeysReq {
  string user_id = 1;
  string org_id = 2;
}

message WanwuApiKeyBrief {
  string key_id = 1;
  string name = 2;
  string desc = 3;
  string key = 4;        // 完整 API Key 值（仅此接口返回）
  bool status = 5;       // 是否启用
  int64 expired_at = 6;  // 过期时间
}

message ListWanwuApiKeysResp {
  repeated WanwuApiKeyBrief list = 1;
  int32 total = 2;
}

// ============================================================
// 扫码登录
// ============================================================

message CreateQRLoginReq {
  string channel_type = 1;  // wechat/dingtalk/feishu
  string user_id = 2;
  string org_id = 3;
}

message CreateQRLoginResp {
  string session_id = 1;    // 扫码会话 ID
  string qr_url = 3;        // 二维码 URL（所有平台通用，前端用此字段生成/展示二维码）
  int64 expire_at = 4;      // 过期时间 Unix 时间戳
  int64 expire_time = 5;    // 过期时长（秒）
}

message GetQRLoginStatusReq {
  string channel_type = 1;
  string session_id = 2;
}

message QRLoginStatus {
  string status = 1;        // waiting/scanned/confirmed/success/expired/error
  map<string, string> credentials = 2;  // 登录成功时返回的平台凭据
  string error = 3;
}

message CancelQRLoginReq {
  string channel_type = 1;
  string session_id = 2;
}

message CompleteQRLoginReq {
  string channel_type = 1;
  string session_id = 2;
  string user_id = 3;
  string org_id = 4;
}

// ============================================================
// 通道管理
// ============================================================

message CreateChannelReq {
  string name = 1;
  string channel_type = 2;  // wechat/dingtalk/feishu
  string app_type = 3;      // agent（默认）/ wga（通用智能体）
  string app_id = 4;        // 智能体 UUID
  string api_key_id = 5;    // API Key ID
  string api_key = 6;       // API Key 完整值（创建时传入）
  map<string, string> config = 7;  // 平台特定配置
  string user_id = 8;
  string org_id = 9;
  string model_uuid = 10;   // WGA 通道使用的模型 UUID
  string app_name = 11;     // 智能体名称（由 BFF 层查询填充）
}

message ListChannelsReq {
  string user_id = 1;
  string org_id = 2;
  int32 page_no = 3;
  int32 page_size = 4;
  string name = 5;  // 按渠道名称模糊搜索
}

message GetChannelReq {
  string channel_id = 1;
}

message UpdateChannelReq {
  string channel_id = 1;
  string name = 2;
  string app_id = 3;
  string api_key_id = 4;
  string api_key = 5;       // 更新 API Key 时传入
  map<string, string> config = 6;
  string user_id = 7;
  string org_id = 8;
  string model_uuid = 9;   // WGA 通道使用的模型 UUID
  string app_name = 10;    // 智能体名称（由 BFF 层查询填充）
}

message UpdateChannelStatusReq {
  string channel_id = 1;
  bool enabled = 2;
  string user_id = 3;
  string org_id = 4;
}

message DeleteChannelReq {
  string channel_id = 1;
  string user_id = 2;
  string org_id = 3;
}

message DisconnectChannelReq {
  string channel_id = 1;
}

// Channel 通道完整信息
message Channel {
  string id = 1;            // 通道 ID (UUID)
  string name = 2;
  string channel_type = 3;  // wechat/dingtalk/feishu
  string status = 4;        // loggedIn/offline
  string account_id = 5;
  string nickname = 6;
  string avatar = 7;
  bool enabled = 8;
  string app_type = 9;
  string app_id = 10;
  string app_name = 11;
  string api_key_id = 12;
  string api_key_name = 13;
  bool has_api_key = 14;
  map<string, string> config = 15;  // 平台配置（敏感字段脱敏）
  string created_at = 16;
  string updated_at = 17;
  string user_id = 18;
  string org_id = 19;
  string model_uuid = 20;   // WGA 通道使用的模型 UUID
}

message ListChannelsResp {
  repeated Channel list = 1;
  int32 total = 2;
}
